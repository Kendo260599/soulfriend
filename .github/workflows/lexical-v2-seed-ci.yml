name: Lexical V2 Seed CI

on:
  push:
    paths:
      - lexical_engine/**
      - .github/workflows/lexical-v2-seed-ci.yml
  pull_request:
    paths:
      - lexical_engine/**
      - .github/workflows/lexical-v2-seed-ci.yml

jobs:
  lexical-v2-seed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lexical_engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run V2 seed pipeline dry-run
        run: |
          python scripts/run_v2_seed_pipeline.py --ensure-seed --report-prefix ci_

      - name: Run focused tests
        run: |
          python -m pytest \
            tests/test_v2_seed_pipeline.py \
            tests/test_lesson_path_v2_seed_order.py \
            tests/test_lesson_path_strict_mode.py \
            tests/test_import_report_lineage.py \
            tests/test_import_replace_guard.py \
            tests/test_v1_core_preservation.py -q

      - name: Verify report integrity
        run: |
          python scripts/check_v2_report_integrity.py --report-dir data/reports/v2_seed_import --prefix ci_
