# ==============================================================================
# SoulFriend - Development Docker Compose Configuration
# ==============================================================================

version: '3.8'

services:
  # ==============================================================================
  # MongoDB Database (Development)
  # ==============================================================================
  mongodb:
    image: mongo:7.0
    container_name: soulfriend-mongodb-dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_DEV_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_DEV_PASSWORD:?Set MONGO_DEV_PASSWORD in .env}
      MONGO_INITDB_DATABASE: soulfriend_dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_dev_data:/data/db
    networks:
      - soulfriend-dev-network

  # ==============================================================================
  # Backend API (Development with hot reload)
  # ==============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: soulfriend-backend-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "127.0.0.1:9229:9229"  # Node.js debug port (localhost only)
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_DEV_USERNAME:-admin}:${MONGO_DEV_PASSWORD}@mongodb:27017/soulfriend_dev?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@soulfriend.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?Set DEFAULT_ADMIN_PASSWORD in .env}
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      LOG_LEVEL: debug
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - mongodb
    networks:
      - soulfriend-dev-network
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - backend_dev_logs:/app/logs
      - /app/node_modules  # Prevent overwriting node_modules

# ==============================================================================
# Networks
# ==============================================================================
networks:
  soulfriend-dev-network:
    driver: bridge

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  mongodb_dev_data:
    driver: local
  backend_dev_logs:
    driver: local