<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Google Gemini API Key</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .api-key-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            border: 2px solid #e0e0e0;
        }
        
        .button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
            display: block;
        }
        
        .result.error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
            display: block;
        }
        
        .result.loading {
            background: #d1ecf1;
            border: 2px solid #17a2b8;
            color: #0c5460;
            display: block;
        }
        
        .result-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        
        .response-text {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            white-space: pre-wrap;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }
        
        .info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .info-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .status-success {
            background: #28a745;
            color: white;
        }
        
        .status-error {
            background: #dc3545;
            color: white;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Test Google Gemini API</h1>
        <p class="subtitle">Kiểm tra API key có hoạt động không</p>
        
        <div class="info">
            <div class="info-title">📋 API Key:</div>
            <div class="api-key-display" id="apiKey">***REDACTED_GEMINI_KEY***</div>
        </div>
        
        <button class="button" id="testBtn" onclick="testAPI()">
            ✨ Test API Key
        </button>
        
        <button class="button" id="testChatBtn" onclick="testChat()">
            💬 Test Chat (Xin chào)
        </button>
        
        <button class="button" id="testMentalHealthBtn" onclick="testMentalHealth()">
            🧠 Test Mental Health Question
        </button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        const API_KEY = '***REDACTED_GEMINI_KEY***';
        const API_URL = 'https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent';

        function showLoading() {
            const result = document.getElementById('result');
            result.className = 'result loading';
            result.innerHTML = `
                <div class="result-title">⏳ Đang kiểm tra...</div>
                <div class="spinner"></div>
                <p>Vui lòng đợi trong giây lát...</p>
            `;
        }

        function showSuccess(title, message, response) {
            const result = document.getElementById('result');
            result.className = 'result success';
            result.innerHTML = `
                <div class="result-title">✅ ${title}</div>
                <p>${message}</p>
                <span class="status-badge status-success">API HOẠT ĐỘNG</span>
                ${response ? `<div class="response-text">${response}</div>` : ''}
            `;
        }

        function showError(title, error) {
            const result = document.getElementById('result');
            result.className = 'result error';
            result.innerHTML = `
                <div class="result-title">❌ ${title}</div>
                <p>${error}</p>
                <span class="status-badge status-error">API KHÔNG HOẠT ĐỘNG</span>
            `;
        }

        async function testAPI() {
            showLoading();
            
            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: 'Hello, test connection' }]
                        }]
                    })
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(`HTTP ${response.status}: ${error}`);
                }

                const data = await response.json();
                console.log('✅ API Response:', data);
                
                showSuccess(
                    'Kết nối thành công!', 
                    'API key hoạt động tốt. Bạn có thể sử dụng Gemini trong chatbot.',
                    null
                );

            } catch (error) {
                console.error('❌ API Error:', error);
                
                if (error.message.includes('API_KEY_INVALID') || error.message.includes('403')) {
                    showError('API Key không hợp lệ', 'API key đã hết hạn hoặc không đúng. Vui lòng kiểm tra lại.');
                } else if (error.message.includes('429')) {
                    showError('Vượt quá giới hạn', 'API đã vượt quá quota. Vui lòng thử lại sau.');
                } else {
                    showError('Lỗi kết nối', error.message);
                }
            }
        }

        async function testChat() {
            showLoading();
            
            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: 'Xin chào, tôi cần trợ giúp về sức khỏe tâm lý' }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 256,
                        }
                    })
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(`HTTP ${response.status}: ${error}`);
                }

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response';
                
                console.log('✅ Chat Response:', text);
                
                showSuccess(
                    'Chat thành công!', 
                    'Gemini đã phản hồi. API hoạt động tốt!',
                    text
                );

            } catch (error) {
                console.error('❌ Chat Error:', error);
                showError('Lỗi chat', error.message);
            }
        }

        async function testMentalHealth() {
            showLoading();
            
            try {
                const systemPrompt = `Bạn là AI Assistant chuyên nghiệp về sức khỏe tâm lý cho phụ nữ Việt Nam. Hãy trả lời bằng tiếng Việt, ân cần và chuyên nghiệp.`;
                
                const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [{ text: systemPrompt }]
                            },
                            {
                                parts: [{ text: 'Tôi đang cảm thấy stress và lo lắng về công việc. Bạn có thể cho tôi lời khuyên không?' }]
                            }
                        ],
                        generationConfig: {
                            temperature: 0.7,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 512,
                        },
                        safetySettings: [
                            {
                                category: 'HARM_CATEGORY_HARASSMENT',
                                threshold: 'BLOCK_NONE'
                            },
                            {
                                category: 'HARM_CATEGORY_HATE_SPEECH',
                                threshold: 'BLOCK_NONE'
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(`HTTP ${response.status}: ${error}`);
                }

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response';
                
                console.log('✅ Mental Health Response:', text);
                
                showSuccess(
                    'Tư vấn sức khỏe tâm lý thành công!', 
                    'Gemini đã phản hồi chuyên nghiệp. API sẵn sàng cho chatbot!',
                    text
                );

            } catch (error) {
                console.error('❌ Mental Health Test Error:', error);
                showError('Lỗi test tư vấn', error.message);
            }
        }

        // Auto test on load
        window.onload = function() {
            console.log('🔍 Testing Gemini API...');
            testAPI();
        };
    </script>
</body>
</html>
